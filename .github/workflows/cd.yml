name: CD

on:
  push:
    branches: [main, develop]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements-dev.txt
      - name: Run backend tests
        run: cd backend && pytest -v --tb=short

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: Run frontend tests
        run: cd frontend && npm test
      - name: Build frontend
        run: cd frontend && npm run build

  staging-deploy:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/develop' && vars.STAGING_HOST != ''
    environment: staging
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/openschool-staging
            git pull origin develop
            docker compose -f docker-compose.staging.yml --env-file .env.staging down frontend
            docker volume rm -f openschool-staging_staging_frontend_build
            docker compose -f docker-compose.staging.yml --env-file .env.staging up --build --force-recreate -d
            docker compose -f docker-compose.staging.yml --env-file .env.staging exec -T backend alembic upgrade head
            sleep 5
            docker compose -f docker-compose.staging.yml --env-file .env.staging exec -T backend curl -f http://localhost:8000/health
            echo "Staging deploy successful!"
      - uses: actions/checkout@v6
        if: always()
      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK_CI: ${{ secrets.DISCORD_WEBHOOK_CI }}
        run: |
          chmod +x ./scripts/discord-notify.sh
          ./scripts/discord-notify.sh \
            --status "${{ job.status }}" \
            --title "Staging Deploy" \
            --repo "${{ github.repository }}" \
            --commit "${{ github.sha }}" \
            --author "${{ github.actor }}" \
            --url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' && vars.VPS_HOST != ''
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/openschool
            git pull origin main
            docker compose -f docker-compose.prod.yml --env-file .env.prod down frontend
            docker volume rm -f openschool_frontend_build
            docker compose -f docker-compose.prod.yml --env-file .env.prod up --build --force-recreate -d
            docker compose -f docker-compose.prod.yml --env-file .env.prod exec -T backend alembic upgrade head
            sleep 5
            docker compose -f docker-compose.prod.yml --env-file .env.prod exec -T backend curl -f http://localhost:8000/health

            # Update maintenance automation (cron + logrotate)
            chmod +x scripts/maintenance.sh scripts/setup-cron.sh
            sudo scripts/setup-cron.sh

            echo "Deploy successful!"
      - uses: actions/checkout@v6
        if: always()
      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK_CI: ${{ secrets.DISCORD_WEBHOOK_CI }}
        run: |
          chmod +x ./scripts/discord-notify.sh
          ./scripts/discord-notify.sh \
            --status "${{ job.status }}" \
            --title "Production Deploy" \
            --repo "${{ github.repository }}" \
            --commit "${{ github.sha }}" \
            --author "${{ github.actor }}" \
            --url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
