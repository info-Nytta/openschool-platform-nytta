services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file: .env
    volumes:
      - ./backend:/app

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - frontend_dist:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend

  frontend:
    build: ./frontend
    volumes:
      - frontend_dist:/usr/share/nginx/html

volumes:
  pgdata:
  frontend_dist:
